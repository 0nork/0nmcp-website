<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="bgVault" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0e0a18" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1"/>
    </radialGradient>
    <!-- Layer ring gradients -->
    <radialGradient id="ringGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ed957" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7ed957" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shieldGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e1230" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="vaultAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7ed957" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow3" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgVault)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="133" y1="0" x2="133" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>

  <!-- ─── 7 concentric rings (semantic layers) ─── -->
  <!-- Ring 7 outermost: audit_trail (faint purple) -->
  <circle cx="370" cy="225" r="198" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.15" stroke-dasharray="8 6"/>
  <!-- Ring 6: ai_brain -->
  <circle cx="370" cy="225" r="175" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.2" stroke-dasharray="6 5"/>
  <!-- Ring 5: site_profiles -->
  <circle cx="370" cy="225" r="152" fill="none" stroke="#7ed957" stroke-width="0.8" opacity="0.2" stroke-dasharray="5 5"/>
  <!-- Ring 4: mcp_configs -->
  <circle cx="370" cy="225" r="129" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25" stroke-dasharray="4 4"/>
  <!-- Ring 3: env_vars -->
  <circle cx="370" cy="225" r="106" fill="none" stroke="#7ed957" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <!-- Ring 2: credentials (bright — double encrypted) -->
  <circle cx="370" cy="225" r="83" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <!-- Ring 1 innermost: workflows -->
  <circle cx="370" cy="225" r="60" fill="none" stroke="#7ed957" stroke-width="2" opacity="0.65"/>

  <!-- Layer labels on rings -->
  <text transform="rotate(-90, 370, 225)" x="370" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#a78bfa" opacity="0.55">audit_trail</text>
  <text transform="rotate(-90, 370, 225)" x="370" y="41" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#a78bfa" opacity="0.5">ai_brain</text>
  <text transform="rotate(-90, 370, 225)" x="370" y="64" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#7ed957" opacity="0.5">site_profiles</text>
  <text transform="rotate(-90, 370, 225)" x="370" y="87" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00d4ff" opacity="0.6">mcp_configs</text>
  <text transform="rotate(-90, 370, 225)" x="370" y="110" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#7ed957" opacity="0.6">env_vars</text>
  <text transform="rotate(-90, 370, 225)" x="370" y="133" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#a78bfa" opacity="0.75">credentials ×2</text>
  <text transform="rotate(-90, 370, 225)" x="370" y="156" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#7ed957" opacity="0.8">workflows</text>

  <!-- Core vault glow -->
  <circle cx="370" cy="225" r="50" fill="rgba(167,139,250,0.06)"/>

  <!-- ─── Shield shape ─── -->
  <g transform="translate(328, 168)">
    <path d="M42,0 L84,18 L84,54 C84,75 42,90 42,90 C42,90 0,75 0,54 L0,18 Z"
      fill="url(#shieldGrad)" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
    <!-- Shield inner highlight -->
    <path d="M42,8 L76,23 L76,53 C76,70 42,83 42,83 C42,83 8,70 8,53 L8,23 Z"
      fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>
    <!-- 0n inside shield -->
    <text x="42" y="52" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700" fill="#7ed957" filter="url(#textGlow3)">0n</text>
    <!-- Lock icon at top of shield -->
    <rect x="34" y="20" width="16" height="12" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <path d="M37,20 C37,16 47,16 47,20" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="42" cy="27" r="2" fill="#a78bfa"/>
    <line x1="42" y1="27" x2="42" y2="30" stroke="#a78bfa" stroke-width="1.5"/>
  </g>

  <!-- ─── Ed25519 signature visualization ─── -->
  <!-- Small hash marks around outer area -->
  <g opacity="0.5">
    <!-- Hash row top-right -->
    <text x="570" y="92" font-family="'JetBrains Mono', monospace" font-size="8" fill="#7ed957" opacity="0.6">a3f8...b912</text>
    <text x="570" y="107" font-family="'JetBrains Mono', monospace" font-size="8" fill="#a78bfa" opacity="0.5">Ed25519 ✓</text>
    <line x1="563" y1="88" x2="563" y2="112" stroke="#7ed957" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ─── Seal of Truth symbol (lower right) ─── -->
  <g transform="translate(560, 270)">
    <!-- Outer seal ring -->
    <circle cx="40" cy="40" r="36" fill="none" stroke="#7ed957" stroke-width="1.5" opacity="0.7" stroke-dasharray="3 2"/>
    <!-- Inner seal -->
    <circle cx="40" cy="40" r="26" fill="rgba(126,217,87,0.05)" stroke="#7ed957" stroke-width="1" opacity="0.5"/>
    <!-- Checkmark / hash symbol -->
    <path d="M30,38 L37,46 L52,31" stroke="#7ed957" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow3)"/>
    <!-- SHA3-256 label -->
    <text x="40" y="68" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#7ed957" opacity="0.8">SHA3-256</text>
    <text x="40" y="80" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8888a0">Seal of Truth</text>
  </g>

  <!-- ─── Escrow key icons (left side) ─── -->
  <g transform="translate(30, 155)">
    <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00d4ff" opacity="0.7">ESCROW</text>
    <!-- Key 1 -->
    <g transform="translate(0, 12)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
      <circle cx="10" cy="10" r="4" fill="rgba(0,212,255,0.2)" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
      <line x1="18" y1="10" x2="30" y2="10" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
      <line x1="26" y1="10" x2="26" y2="14" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
      <line x1="30" y1="10" x2="30" y2="14" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    </g>
    <!-- Key 2 -->
    <g transform="translate(0, 36)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
      <circle cx="10" cy="10" r="4" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
      <line x1="18" y1="10" x2="30" y2="10" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
      <line x1="26" y1="10" x2="26" y2="14" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
      <line x1="30" y1="10" x2="30" y2="14" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    </g>
    <!-- Key 3 -->
    <g transform="translate(0, 60)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#7ed957" stroke-width="1.5" opacity="0.8"/>
      <circle cx="10" cy="10" r="4" fill="rgba(126,217,87,0.2)" stroke="#7ed957" stroke-width="1" opacity="0.6"/>
      <line x1="18" y1="10" x2="30" y2="10" stroke="#7ed957" stroke-width="1.5" opacity="0.6"/>
      <line x1="26" y1="10" x2="26" y2="14" stroke="#7ed957" stroke-width="1.5" opacity="0.6"/>
      <line x1="30" y1="10" x2="30" y2="14" stroke="#7ed957" stroke-width="1.5" opacity="0.6"/>
    </g>
    <text x="0" y="92" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8888a0">X25519 ECDH</text>
    <text x="0" y="105" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8888a0">up to 8 parties</text>
  </g>

  <!-- ─── Right side: binary format indicator ─── -->
  <g transform="translate(680, 155)">
    <rect x="0" y="0" width="100" height="75" rx="6" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
    <text x="50" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#8888a0">magic bytes</text>
    <text x="50" y="33" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#a78bfa">0x304E5350</text>
    <line x1="10" y1="40" x2="90" y2="40" stroke="#2a2a3a" stroke-width="1"/>
    <text x="50" y="54" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#8888a0">format</text>
    <text x="50" y="68" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#7ed957">.0nv</text>
  </g>

  <!-- ─── Patent number (subtle, bottom-right corner) ─── -->
  <text x="792" y="440" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="8" fill="#55556a">Patent Pending US #63/990,046</text>

  <!-- ─── Deed lifecycle bar at bottom ─── -->
  <g transform="translate(60, 395)">
    <!-- lifecycle label -->
    <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="8" fill="#8888a0" letter-spacing="0.1em">DEED LIFECYCLE</text>
    <!-- Stages -->
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="60" height="22" rx="4" fill="#1a1a25" stroke="#7ed957" stroke-width="1"/>
      <text x="30" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#7ed957">CREATE</text>
    </g>
    <line x1="60" y1="21" x2="72" y2="21" stroke="#2a2a3a" stroke-width="1" transform="translate(0,10)"/>
    <polygon points="70,17 78,21 70,25" fill="#2a2a3a" transform="translate(0,10)"/>
    <g transform="translate(78, 10)">
      <rect x="0" y="0" width="66" height="22" rx="4" fill="#1a1a25" stroke="#a78bfa" stroke-width="1"/>
      <text x="33" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#a78bfa">PACKAGE</text>
    </g>
    <line x1="144" y1="21" x2="156" y2="21" stroke="#2a2a3a" stroke-width="1" transform="translate(0,10)"/>
    <polygon points="154,17 162,21 154,25" fill="#2a2a3a" transform="translate(0,10)"/>
    <g transform="translate(162, 10)">
      <rect x="0" y="0" width="62" height="22" rx="4" fill="#1a1a25" stroke="#00d4ff" stroke-width="1"/>
      <text x="31" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00d4ff">ESCROW</text>
    </g>
    <line x1="224" y1="21" x2="236" y2="21" stroke="#2a2a3a" stroke-width="1" transform="translate(0,10)"/>
    <polygon points="234,17 242,21 234,25" fill="#2a2a3a" transform="translate(0,10)"/>
    <g transform="translate(242, 10)">
      <rect x="0" y="0" width="62" height="22" rx="4" fill="#1a1a25" stroke="#7ed957" stroke-width="1"/>
      <text x="31" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#7ed957">ACCEPT</text>
    </g>
    <line x1="304" y1="21" x2="316" y2="21" stroke="#2a2a3a" stroke-width="1" transform="translate(0,10)"/>
    <polygon points="314,17 322,21 314,25" fill="#2a2a3a" transform="translate(0,10)"/>
    <g transform="translate(322, 10)">
      <rect x="0" y="0" width="60" height="22" rx="4" fill="#1a1a25" stroke="#a78bfa" stroke-width="1"/>
      <text x="30" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#a78bfa">IMPORT</text>
    </g>
    <line x1="382" y1="21" x2="394" y2="21" stroke="#2a2a3a" stroke-width="1" transform="translate(0,10)"/>
    <polygon points="392,17 400,21 392,25" fill="#2a2a3a" transform="translate(0,10)"/>
    <g transform="translate(400, 10)">
      <rect x="0" y="0" width="50" height="22" rx="4" fill="#1a1a25" stroke="#7ed957" stroke-width="2" filter="url(#glow3)"/>
      <text x="25" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#7ed957" font-weight="700">FLIP</text>
    </g>
  </g>
</svg>
